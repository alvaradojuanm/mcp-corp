# Ingress de Kubernetes vanilla — alternativa a route.yaml (que es
# específico de OpenShift). Usa UNO de los dos según el destino:
#   - OpenShift            -> route.yaml   (oc apply -f route.yaml)
#   - Kubernetes vanilla   -> ingress.yaml  (kubectl apply -f ingress.yaml)
# No apliques ambos: son formas distintas de exponer el mismo Service.
#
# Asume un ingress-nginx ya instalado en el cluster y cert-manager para
# TLS automático — ajusta las anotaciones si el cluster usa otro
# controlador de Ingress u otro emisor de certificados.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-corp
  labels:
    app: mcp-corp
  annotations:
    # TODO: ajusta si el cluster no usa ingress-nginx.
    kubernetes.io/ingress.class: nginx
    # TODO: ajusta o quita si el cluster no usa cert-manager.
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - TODO-mcp-corp.example.com
      secretName: mcp-corp-tls
  rules:
    - host: TODO-mcp-corp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-corp
                port:
                  name: http
