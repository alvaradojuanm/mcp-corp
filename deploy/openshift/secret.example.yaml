# PLANTILLA — no contiene valores reales, y este archivo SÍ se versiona.
# El Secret real se crea imperativamente (ver README de esta carpeta) o
# con un gestor de secretos externo (Vault, Sealed Secrets, etc.); nunca
# copiando este archivo con valores reales y aplicándolo directamente.
apiVersion: v1
kind: Secret
metadata:
  name: mcp-corp-secrets
  labels:
    app: mcp-corp
type: Opaque
stringData:
  # Obligatorio con MCP_CORP_ENVIRONMENT=production (fail-closed, ver
  # config.py). Debe ser IGUAL en todas las réplicas — si cada una tuviera
  # una clave distinta, la correlación entre logs de réplicas diferentes
  # se rompe (ver README, sección de auditoría).
  MCP_CORP_AUDIT_HMAC_SECRET: "REEMPLAZAR-nunca-comittear-el-valor-real"

  # Cadena de conexión completa a Postgres, con credenciales.
  MCP_CORP_POSTGRES__DSN: "postgresql://usuario:REEMPLAZAR@host:5432/db"
