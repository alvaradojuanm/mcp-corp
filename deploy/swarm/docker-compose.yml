# Stack de Docker Swarm para mcp-corp, balanceado por Traefik en Portainer.
#
# Objetivo de este archivo: demostrar que el server es horizontalmente
# escalable porque es stateless por invocación (2 réplicas idénticas,
# cualquiera puede atender cualquier request).
#
# Uso:
#   docker stack deploy -c deploy/swarm/docker-compose.yml mcp-corp
#
# Requiere una red overlay externa llamada "traefik-public" con Traefik
# corriendo como el edge router del swarm (patrón estándar de Portainer).
#
# --- Cómo escalar réplicas desde Portainer ---
# Stacks → mcp-corp → Services → mcp-corp → "Scale service" (o edita
# `deploy.replicas` abajo y vuelve a desplegar el stack). Portainer aplica
# el cambio como una actualización rolling: Traefik deja de enrutarle
# tráfico nuevo a las réplicas que se retiran (gracias a
# `update_config.order: start-first` de abajo, las nuevas arrancan y pasan
# su healthcheck ANTES de que se apaguen las viejas) y cada una drena sus
# peticiones en curso durante `MCP_CORP_GRACEFUL_SHUTDOWN_TIMEOUT_SECONDS`
# antes de terminar. Ver "Verificaciones bajo carga" en el README para los
# números reales medidos en esta secuencia.
#
# --- Fórmula de capacidad al escalar (ver README para el detalle) ---
# Si activas los conectores (Postgres, API de saldos) en este stack, el
# `max_concurrency` de cada uno se configura POR RÉPLICA:
#   límite por réplica = techo de la fuente ÷ número de réplicas
# Súbelo o bájalo cada vez que cambies `deploy.replicas`, o te arriesgas a
# ahogar la fuente (si subes réplicas sin bajar el límite) o a
# desperdiciar capacidad (si haces lo contrario).

services:
  mcp-corp:
    image: mcp-corp:latest
    environment:
      MCP_CORP_SERVICE_NAME: mcp-corp
      MCP_CORP_ENVIRONMENT: production
      MCP_CORP_HOST: "0.0.0.0"
      MCP_CORP_PORT: "8000"
      MCP_CORP_LOG_LEVEL: INFO
      MCP_CORP_GRACEFUL_SHUTDOWN_TIMEOUT_SECONDS: "10"
      # OBLIGATORIO con MCP_CORP_ENVIRONMENT=production (fail-closed desde
      # la Fase 4, Parte B: ver config.py). NO pongas el valor real aquí —
      # este archivo se versiona. Cárgalo en Portainer como variable de
      # entorno del stack (o como Docker secret si tu versión de Portainer
      # lo soporta) y referencia esa variable al desplegar. Debe ser IGUAL
      # en todas las réplicas. Genera uno con:
      #   python -c "import secrets; print(secrets.token_hex(32))"
      MCP_CORP_AUDIT_HMAC_SECRET: "${MCP_CORP_AUDIT_HMAC_SECRET:?la variable de entorno MCP_CORP_AUDIT_HMAC_SECRET es obligatoria en producción}"
    networks:
      - traefik-public
    healthcheck:
      # Mismo endpoint de liveness que el HEALTHCHECK del Dockerfile.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      # Dos réplicas para demostrar escalado horizontal detrás de Traefik.
      # El proceso no guarda estado local, así que cualquier réplica puede
      # atender cualquier request sin sticky sessions.
      replicas: 2
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        # Habilita el descubrimiento de este servicio por Traefik.
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public"

        # Router HTTP: ajustar el Host() al dominio real antes de producción.
        - "traefik.http.routers.mcp-corp.rule=Host(`mcp-corp.local`)"
        - "traefik.http.routers.mcp-corp.entrypoints=web"

        # Traefik balancea round-robin entre las réplicas de este servicio.
        - "traefik.http.services.mcp-corp.loadbalancer.server.port=8000"

        # Traefik también puede vigilar la salud de cada réplica. Es
        # semántica de READINESS (decide a qué réplicas enrutar tráfico),
        # no de liveness — por eso /ready, nunca /health: con /health,
        # Traefik seguiría enrutando a una réplica que ya está drenando
        # durante un apagado (/ready cae a 503 antes de que el proceso
        # muera, pero /health sigue en 200 hasta el final). Corregido en
        # la Fase 5 tras encontrarlo en mcp-corp-stack.yml.
        - "traefik.http.services.mcp-corp.loadbalancer.healthcheck.path=/ready"
        - "traefik.http.services.mcp-corp.loadbalancer.healthcheck.interval=10s"

networks:
  traefik-public:
    external: true
