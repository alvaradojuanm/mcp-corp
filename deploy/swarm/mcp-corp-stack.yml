# =============================================================================
# STACK: mcp-corp — Server MCP corporativo (PRE-PRODUCCIÓN)
# Portainer > Stacks > Add stack > Web editor
# =============================================================================
#
# ETAPA 1 — servidor solo, sin conectores.
# Valida: arranque, Traefik, TLS y resolución de secretos por archivo.
#
# Para pasar a la ETAPA 2 (Postgres), cambia UNA línea:
#     MCP_CORP_POSTGRES__ENABLED: "false"   →   "true"
# y vuelve a desplegar el stack.
#
# -----------------------------------------------------------------------------
# PRERREQUISITOS — todos cumplidos:
#   Imagen:    mcp-corp:1.0.1 cargada en el nodo (docker load)
#   Secretos:  mcp_corp_audit_hmac_secret · mcp_corp_postgres_dsn
#   Redes:     traefik_public · agent_network
#   Base:      mcp_corp (owner mcp_corp) en postgres_18_general_postgres
#              tablas: clientes (4 filas) · accounts
#   DNS:       ss11.dployxperts.com (CNAME, sin proxy de Cloudflare)
# -----------------------------------------------------------------------------
#
# CAPACIDAD MEDIDA en postgres_18_general:
#   max_connections=200 · en uso ~12 · reservadas 3  →  ~185 disponibles
#   Con MAX_POOL_SIZE=10 y 2 réplicas = 20 conexiones (11% del presupuesto).
#   Margen para escalar hasta ~18 réplicas.
#   Fórmula: límite por réplica = techo de la fuente ÷ nº de réplicas
#
# ESCALAR: Stacks → mcp-corp → Services → "Scale service".
#   Con order=start-first las réplicas nuevas pasan su healthcheck antes de
#   que Traefik deje de enrutar a las viejas. En cada rotación los clientes
#   MCP pierden su sesión SSE y deben reconectar (medido en Fase 4).
# =============================================================================

version: "3.8"

services:
  mcp-corp:
    image: mcp-corp:1.0.1

    environment:
      MCP_CORP_SERVICE_NAME: mcp-corp
      # production activa el fail-closed: sin clave HMAC el server NO arranca
      MCP_CORP_ENVIRONMENT: production
      MCP_CORP_HOST: "0.0.0.0"
      MCP_CORP_PORT: "8000"
      MCP_CORP_LOG_LEVEL: INFO
      MCP_CORP_GRACEFUL_SHUTDOWN_TIMEOUT_SECONDS: "10"

      # Secretos montados por Swarm en /run/secrets/<target> y resueltos por
      # config.py::_load_file_secrets_into_environ (patrón _FILE).
      MCP_CORP_AUDIT_HMAC_SECRET_FILE: /run/secrets/audit_hmac_secret
      MCP_CORP_POSTGRES__DSN_FILE: /run/secrets/postgres_dsn

      # ── Conector Postgres ────────────────────────────────────────────────
      # ETAPA 1: "false". Cambiar a "true" para la Etapa 2.
      MCP_CORP_POSTGRES__ENABLED: "false"
      MCP_CORP_POSTGRES__MIN_POOL_SIZE: "1"
      MCP_CORP_POSTGRES__MAX_POOL_SIZE: "10"
      MCP_CORP_POSTGRES__MAX_CONCURRENCY: "10"

      # ── Conector API de saldos ───────────────────────────────────────────
      # Pendiente: definir BASE_URL real (o desplegar el stub) antes de activar.
      MCP_CORP_SALDO_API__ENABLED: "false"
      MCP_CORP_SALDO_API__MAX_CONCURRENCY: "10"

    secrets:
      - source: mcp_corp_audit_hmac_secret
        target: audit_hmac_secret
      - source: mcp_corp_postgres_dsn
        target: postgres_dsn

    networks:
      - traefik_public
      - agent_network

    healthcheck:
      # LIVENESS (Docker/Swarm): ¿el proceso sigue vivo? Si falla, Swarm
      # reinicia el contenedor. Va a /health, no a /ready — a propósito.
      # La imagen base no trae curl ni wget: se usa urllib de la stdlib,
      # mismo mecanismo que el HEALTHCHECK del Dockerfile.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"

        # ── Router HTTPS (principal) ─────────────────────────────────────
        - "traefik.http.routers.mcp-corp.rule=Host(`ss11.dployxperts.com`)"
        - "traefik.http.routers.mcp-corp.entrypoints=websecure"
        - "traefik.http.routers.mcp-corp.tls=true"
        - "traefik.http.routers.mcp-corp.tls.certresolver=letsencrypt"

        # ── Router HTTP: solo redirige a HTTPS ───────────────────────────
        - "traefik.http.routers.mcp-corp-http.rule=Host(`ss11.dployxperts.com`)"
        - "traefik.http.routers.mcp-corp-http.entrypoints=web"
        - "traefik.http.routers.mcp-corp-http.middlewares=mcp-corp-https-redirect"
        - "traefik.http.middlewares.mcp-corp-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.middlewares.mcp-corp-https-redirect.redirectscheme.permanent=true"

        # ── Balanceo entre réplicas ──────────────────────────────────────
        - "traefik.http.services.mcp-corp.loadbalancer.server.port=8000"
        # READINESS (Traefik): decide a qué réplicas mandar tráfico.
        # Va a /ready, NUNCA a /health: durante un apagado /ready cae a 503
        # mientras /health sigue en 200, y con /health aquí Traefik seguiría
        # enrutando a una réplica que ya está drenando.
        - "traefik.http.services.mcp-corp.loadbalancer.healthcheck.path=/ready"
        - "traefik.http.services.mcp-corp.loadbalancer.healthcheck.interval=10s"

# =============================================================================
networks:
  traefik_public:
    external: true
  # Red donde vive postgres_18_general_postgres (alias: postgres)
  agent_network:
    external: true

secrets:
  mcp_corp_audit_hmac_secret:
    external: true
  mcp_corp_postgres_dsn:
    external: true
