# Infraestructura de desarrollo para probar los conectores reales de las
# Fases 2 y 3 (Postgres + el stub de la API de saldos). NO es el stack de
# despliegue (eso es deploy/swarm/); esto es solo para levantar localmente
# lo que necesitan los tests de integración en tests/connectors/ y
# tests/tools/.
#
# Uso:
#   docker compose -f docker-compose.dev.yml up -d
#   uv run pytest
#   docker compose -f docker-compose.dev.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcp_corp
      POSTGRES_PASSWORD: mcp_corp
      POSTGRES_DB: mcp_corp
    ports:
      - "5432:5432"
    volumes:
      - ./deploy/dev/postgres-seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp_corp -d mcp_corp"]
      interval: 2s
      timeout: 3s
      retries: 10

  saldo-api:
    image: python:3.12-alpine
    working_dir: /app
    volumes:
      - ./deploy/dev/saldo_api_stub.py:/app/saldo_api_stub.py:ro
    command: ["python", "saldo_api_stub.py"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2)"]
      interval: 2s
      timeout: 3s
      retries: 10
